<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0194fe"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ProClean"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Alata&family=Dancing+Script:wght@500&display=swap" rel="stylesheet"/>
<title>ProClean</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --brand:#0194fe;--brand-d:#0076d1;--brand-l:#e6f4ff;
  --grey:#545454;--grey-l:#f0f0f0;
  --ink:#1a1a1a;--ink2:#545454;--ink3:#9a9a9a;
  --bg:#f7f8fa;--card:#fff;--bdr:#e4e7ec;
  --green:#16a34a;--green-l:#dcfce7;--green-d:#14532d;
  --red:#dc2626;--red-l:#fee2e2;
  --amber:#d97706;--amber-l:#fef3c7;
  --purple:#7c3aed;--purple-l:#ede9fe;--purple-d:#4c1d95;
  --teal:#0d9488;--teal-l:#ccfbf1;--teal-d:#134e4a;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --r:14px;--rsm:9px;
  --font-head:'Alata',system-ui,sans-serif;
  --font-script:'Dancing Script',cursive;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column}
#splash{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0194fe;transition:background 1.5s ease}
#splash-canvas{display:none}
#splash-content{position:relative;z-index:2;text-align:center;opacity:0;transform:translateY(14px);transition:opacity .55s ease,transform .55s ease;padding:2rem;pointer-events:none}
#splash-content.show{opacity:1;transform:translateY(0)}
.splash-logo{max-width:200px;width:60%;margin:0 auto 10px;display:block}
.splash-script{font-family:var(--font-script);font-size:1rem;color:var(--grey)}
#auth-screen{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2rem 1.5rem;background:var(--bg);overflow-y:auto}
#auth-screen.visible{display:flex}
.auth-logo-wrap{text-align:center;margin-bottom:1.75rem}
.auth-logo-img{max-width:180px;width:55%}
.auth-card{background:var(--card);border-radius:var(--r);padding:1.6rem 1.4rem;width:100%;max-width:360px;border:1px solid var(--bdr)}
.auth-card h2{font-family:var(--font-head);font-size:1rem;font-weight:400;margin-bottom:1.1rem;color:var(--ink2)}
.field{margin-bottom:.85rem}
.field label{display:block;font-size:.7rem;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}
.field input,.field select{width:100%;padding:.65rem .75rem;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:.95rem;color:var(--ink);background:#fff;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--brand)}
.btn-primary{width:100%;padding:.75rem;background:var(--brand);color:#fff;border:none;border-radius:var(--rsm);font-size:.95rem;font-family:var(--font-head);cursor:pointer;margin-bottom:.6rem}
.btn-biometric{width:100%;padding:.7rem;background:#f0f7ff;color:var(--brand);border:1.5px solid var(--brand-l);border-radius:var(--rsm);font-size:.88rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.4rem}
.auth-switch{text-align:center;margin-top:.85rem;font-size:.82rem;color:var(--ink2)}
.auth-switch a{color:var(--brand);cursor:pointer;font-weight:600}
#biometric-section{width:100%;max-width:360px;margin-top:.75rem}
.biometric-hint{text-align:center;font-size:.78rem;color:var(--ink3);display:flex;align-items:center;justify-content:center;gap:.35rem;margin-bottom:.4rem}
#app{display:none;flex-direction:column;flex:1;overflow:hidden}
#app.visible{display:flex}
.topbar{background:var(--brand);color:#fff;padding-top:calc(.8rem + var(--safe-top));padding-bottom:.8rem;padding-left:1.1rem;padding-right:1.1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-logo{font-family:var(--font-head);font-size:1.15rem;font-weight:400;letter-spacing:.02em}
.role-badge{font-size:.6rem;background:rgba(255,255,255,.25);padding:2px 7px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-left:.5rem}
.topbar-right{display:flex;align-items:center;gap:.5rem}
.topbar-user{font-size:.78rem;opacity:.85}
.topbar-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:.32rem .55rem;border-radius:6px;cursor:pointer;font-size:.78rem;display:flex;align-items:center;gap:3px;min-height:34px}
#page-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.1rem;padding-bottom:calc(1.1rem + var(--safe-bot))}
.inner{max-width:480px;margin:0 auto}
.bottom-nav{background:var(--card);border-top:1px solid var(--bdr);display:flex;flex-shrink:0;padding-bottom:var(--safe-bot)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:.5rem .05rem .4rem;gap:2px;background:none;border:none;cursor:pointer;color:var(--ink3);font-size:.52rem;font-weight:500;min-height:52px}
.nav-btn.active{color:var(--brand)}
.nav-btn i{font-size:1.2rem}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem;margin-bottom:.8rem}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.card-title{font-family:var(--font-head);font-size:.9rem;font-weight:400;color:var(--ink)}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:.85rem}
.stat{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rsm);padding:.75rem;text-align:center}
.stat-val{font-family:var(--font-head);font-size:1.2rem;font-weight:400;color:var(--brand);line-height:1.1}
.stat-lbl{font-size:.65rem;color:var(--ink3);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:.67rem;font-weight:600;gap:2px}
.bg-green{background:var(--green-l);color:var(--green-d)}
.bg-amber{background:var(--amber-l);color:#92400e}
.bg-brand{background:var(--brand-l);color:var(--brand-d)}
.bg-red{background:var(--red-l);color:var(--red)}
.bg-purple{background:var(--purple-l);color:var(--purple-d)}
.bg-teal{background:var(--teal-l);color:var(--teal-d)}
.bg-gray{background:var(--grey-l);color:var(--grey)}
.item-row{display:flex;align-items:flex-start;gap:.7rem;padding:.8rem 0;border-bottom:1px solid var(--bdr)}
.item-row:last-child{border-bottom:none}
.circle-btn{width:24px;height:24px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;cursor:pointer;background:#fff;transition:all .15s}
.circle-btn.done{background:var(--green);border-color:var(--green)}
.circle-btn.done i{color:#fff;font-size:13px}
.item-info{flex:1;min-width:0}
.item-title{font-size:.88rem;font-weight:600;color:var(--ink)}
.item-title.done{text-decoration:line-through;color:var(--ink3)}
.item-sub{font-size:.72rem;color:var(--ink2);margin-top:3px;display:flex;gap:.45rem;flex-wrap:wrap}
.item-sub span{display:flex;align-items:center;gap:2px}
.add-panel{background:var(--brand-l);border:1px solid #b3d9ff;border-radius:var(--r);padding:.9rem;margin-bottom:.85rem}
.add-panel.purple{background:var(--purple-l);border-color:#c4b5fd}
.add-panel.green{background:var(--green-l);border-color:#bbf7d0}
.add-panel h3{font-family:var(--font-head);font-size:.82rem;font-weight:400;color:var(--brand-d);margin-bottom:.7rem}
.add-panel.purple h3{color:var(--purple-d)}
.add-panel.green h3{color:var(--green-d)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:.55rem}
.frow.full{grid-template-columns:1fr}
.ff label{display:block;font-size:.67rem;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.ff input,.ff select{width:100%;padding:.5rem .65rem;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:.82rem;color:var(--ink);background:#fff;outline:none;-webkit-appearance:none}
.ff input:focus,.ff select:focus{border-color:var(--brand)}
.btn-add{background:var(--brand);color:#fff;border:none;border-radius:var(--rsm);padding:.52rem .9rem;font-size:.8rem;font-family:var(--font-head);cursor:pointer;display:inline-flex;align-items:center;gap:4px;min-height:38px}
.btn-green{background:var(--green);color:#fff;border:none;border-radius:var(--rsm);padding:.52rem .9rem;font-size:.8rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;min-height:38px}
.btn-purple{background:var(--purple);color:#fff;border:none;border-radius:var(--rsm);padding:.52rem .9rem;font-size:.8rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;min-height:38px}
.btn-teal{background:var(--teal);color:#fff;border:none;border-radius:var(--rsm);padding:.52rem .9rem;font-size:.8rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;min-height:38px}
.btn-sm{background:none;border:1px solid var(--bdr);border-radius:7px;padding:.3rem .55rem;font-size:.73rem;cursor:pointer;color:var(--ink2);display:inline-flex;align-items:center;gap:3px;min-height:34px}
.btn-del{background:none;border:1px solid var(--red-l);border-radius:7px;padding:.3rem .5rem;font-size:.73rem;cursor:pointer;color:var(--red);min-height:34px}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--ink3)}
.empty i{font-size:2.5rem;margin-bottom:.7rem;display:block}
.empty p{font-size:.85rem}
.date-nav{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rsm);padding:.58rem .85rem}
.date-nav span{flex:1;text-align:center;font-size:.9rem;font-weight:600;font-family:var(--font-head)}
.date-nav button{background:none;border:none;cursor:pointer;color:var(--brand);font-size:1.1rem;padding:.1rem .3rem;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center}
.slbl{font-family:var(--font-head);font-size:.72rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin:.85rem 0 .4rem}
.assign-grid{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem}
.assign-pill{padding:.32rem .7rem;border-radius:20px;font-size:.75rem;font-weight:500;cursor:pointer;border:1.5px solid var(--bdr);background:#fff;color:var(--ink2);transition:all .15s;min-height:34px;display:flex;align-items:center}
.assign-pill.selected{background:var(--brand);border-color:var(--brand);color:#fff}
.assign-pill.team-all{background:var(--green);border-color:var(--green);color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:.85rem}
.cal-hdr{text-align:center;font-size:.63rem;font-weight:600;color:var(--ink3);padding:.3rem 0;text-transform:uppercase}
.cal-day{text-align:center;padding:.38rem .05rem;border-radius:7px;cursor:pointer;font-size:.8rem;min-height:36px;user-select:none}
.cal-day.today{background:var(--brand-l);color:var(--brand);font-weight:700}
.cal-day.selected{background:var(--brand);color:#fff;font-weight:700}
.cal-day.other-month{color:var(--ink3)}
.dot-row{display:flex;justify-content:center;gap:2px;margin-top:2px}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.route-card{background:var(--teal-l);border:1px solid #99f6e4;border-radius:var(--r);padding:.9rem;margin-bottom:.85rem}
.route-card h3{font-family:var(--font-head);font-size:.82rem;color:var(--teal-d);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.route-step{display:flex;align-items:flex-start;gap:.6rem;padding:.5rem 0;border-bottom:1px dashed #99f6e4}
.route-step:last-child{border-bottom:none}
.route-num{width:22px;height:22px;border-radius:50%;background:var(--teal);color:#fff;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.route-addr{font-size:.82rem;font-weight:600;color:var(--teal-d)}
.route-note{font-size:.7rem;color:var(--teal);margin-top:1px}
.cust-card{display:flex;align-items:flex-start;gap:.7rem;padding:.75rem 0;border-bottom:1px solid var(--bdr)}
.cust-card:last-child{border-bottom:none}
.cust-avatar{width:38px;height:38px;border-radius:50%;background:var(--brand-l);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--brand);flex-shrink:0}
.period-tabs,.tabs2{display:flex;gap:3px;margin-bottom:.85rem;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rsm);padding:3px}
.ptab,.tab2{flex:1;padding:.44rem;border:none;border-radius:7px;font-size:.72rem;font-weight:500;cursor:pointer;background:none;color:var(--ink2);min-height:36px}
.ptab.active,.tab2.active{background:var(--brand);color:#fff}
.timesheet-row{display:flex;align-items:center;gap:.45rem;padding:.5rem 0;border-bottom:1px solid var(--bdr);font-size:.77rem}
.timesheet-row:last-child{border-bottom:none}
.hours-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-top:.6rem}
.hours-cell{background:var(--bg);border-radius:7px;padding:.5rem;text-align:center}
.hours-val{font-family:var(--font-head);font-size:.9rem;color:var(--ink)}
.hours-lbl{font-size:.62rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.03em;margin-top:1px}
.recur-badge{background:var(--purple-l);color:var(--purple-d);padding:1px 6px;border-radius:10px;font-size:.63rem;font-weight:600;margin-left:4px}
.clock-in-btn{background:var(--green-l);color:var(--green-d);border:1px solid #bbf7d0;border-radius:7px;padding:.4rem .8rem;font-size:.8rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;min-height:38px}
.clock-out-btn{background:var(--red-l);color:var(--red);border:1px solid #fecaca;border-radius:7px;padding:.4rem .8rem;font-size:.8rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;min-height:38px}
.notif-banner{background:var(--brand);color:#fff;padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;font-size:.82rem;flex-shrink:0}
.notif-banner i{font-size:1.3rem;flex-shrink:0}
.notif-banner-text{flex:1}
.notif-banner-text strong{display:block;font-size:.85rem;margin-bottom:2px;font-family:var(--font-head)}
.notif-banner button{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:6px;padding:.3rem .65rem;font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap;min-height:34px}
.install-banner{background:var(--ink);color:#fff;padding:.7rem 1rem;display:flex;align-items:center;gap:.65rem;font-size:.8rem;flex-shrink:0}
.install-banner i{font-size:1.2rem;color:var(--brand);flex-shrink:0}
.install-banner-text{flex:1}
.install-banner button{background:var(--brand);border:none;color:#fff;border-radius:6px;padding:.3rem .65rem;font-size:.75rem;font-weight:600;cursor:pointer;min-height:34px}
.install-banner .dismiss{background:none;border:none;color:rgba(255,255,255,.45);cursor:pointer;font-size:1rem;padding:.2rem}
.ai-thinking{display:flex;align-items:center;gap:.5rem;padding:.75rem;background:var(--teal-l);border-radius:var(--rsm);margin-bottom:.5rem;font-size:.8rem;color:var(--teal-d)}
.spinner{width:16px;height:16px;border:2px solid var(--teal);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:.6rem 1.1rem;border-radius:20px;font-size:.82rem;font-weight:500;opacity:0;transition:all .3s;z-index:500;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* FINANCIAL POT CARDS */
.pot-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:.85rem}
.pot-card{border-radius:var(--r);padding:.9rem;text-align:center;border:1px solid transparent}
.pot-card.tax{background:#fff3e0;border-color:#ffcc80}
.pot-card.payroll{background:var(--brand-l);border-color:#90caf9}
.pot-card.equipment{background:var(--teal-l);border-color:#80cbc4}
.pot-card.personal{background:var(--green-l);border-color:#a5d6a7}
.pot-card.personal.warning{background:var(--red-l);border-color:#ef9a9a}
.pot-val{font-family:var(--font-head);font-size:1.15rem;font-weight:400;margin-bottom:3px}
.pot-lbl{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;opacity:.7}
.pot-pct{font-size:.72rem;opacity:.55;margin-top:2px}
.fin-period-tabs{display:flex;gap:2px;margin-bottom:.85rem;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rsm);padding:3px;overflow-x:auto}
.fin-tab{flex:1;padding:.4rem .3rem;border:none;border-radius:6px;font-size:.68rem;font-weight:500;cursor:pointer;background:none;color:var(--ink2);min-height:34px;white-space:nowrap}
.fin-tab.active{background:var(--brand);color:#fff}
.view-toggle{display:flex;gap:3px;margin-bottom:.85rem;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rsm);padding:3px}
.view-toggle button{flex:1;padding:.4rem;border:none;border-radius:6px;font-size:.75rem;font-weight:500;cursor:pointer;background:none;color:var(--ink2);min-height:34px}
.view-toggle button.active{background:var(--green);color:#fff}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--bdr)}
.settings-row:last-child{border-bottom:none}
.settings-lbl{font-size:.85rem;font-weight:600;color:var(--ink)}
.settings-sub{font-size:.72rem;color:var(--ink3);margin-top:1px}
.settings-input{width:70px;padding:.3rem .4rem;border:1.5px solid var(--bdr);border-radius:7px;font-size:.88rem;text-align:right;outline:none}
.settings-input:focus{border-color:var(--brand)}
.quarter-block{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:.9rem;margin-bottom:.65rem}
.quarter-title{font-family:var(--font-head);font-size:.85rem;color:var(--ink2);margin-bottom:.65rem;display:flex;align-items:center;justify-content:space-between}
.month-row{display:flex;align-items:center;padding:.45rem 0;border-bottom:1px solid var(--bdr);font-size:.8rem}
.month-row:last-child{border-bottom:none}
.month-name{flex:1;font-weight:500;color:var(--ink2)}
.month-net{width:70px;text-align:right;font-weight:600;color:var(--ink)}
.month-tax{width:60px;text-align:right;color:#e65100;font-size:.75rem}
.month-personal{width:60px;text-align:right;color:var(--green);font-size:.75rem}
.warning-banner{background:var(--red-l);border:1px solid #fca5a5;border-radius:var(--rsm);padding:.7rem .9rem;display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;font-size:.8rem;color:var(--red)}
</style>
</head>
<body>

<div id="splash" style="display:none">

async function cloudInit(){
  if(dbReady){
    try{
      var snap=await db.collection("proclean_data").doc("main").get();
      if(snap.exists){
        var d=snap.data();
        users=d.users||users;jobs=d.jobs||jobs;expenses=d.expenses||expenses;bizBills=d.bizBills||bizBills;
        events=d.events||events;timesheets=d.timesheets||timesheets;hourlyRates=d.hourlyRates||hourlyRates;
        customers=d.customers||customers;biometricUsers=d.biometricUsers||biometricUsers;finSettings=d.finSettings||finSettings;
        var k={pc_users:users,pc_jobs:jobs,pc_expenses:expenses,pc_biz:bizBills,pc_events:events,pc_ts:timesheets,pc_rates:hourlyRates,pc_customers:customers,pc_bio:biometricUsers,pc_fin:finSettings};
        Object.entries(k).forEach(function(e){localStorage.setItem(e[0],JSON.stringify(e[1]));});

function td(){return new Date().toISOString().slice(0,10);}
function fc(n){return "\u20ac"+parseFloat(n||0).toFixed(2);}
function fmtDate(d){return new Date(d+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});}
function fmtTime(iso){if(!iso)return"--:--";return new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});}
function uname(id){var u=users.find(function(u){return u.id===id;});return u?u.name.split(" ")[0]:"?";}
function initials(n){return n.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();}
function caddr(id){var c=customers.find(function(c){return c.id===id;});return c?c.address:"";}
function wkStart(d){var dt=new Date(d+"T12:00:00");dt.setDate(dt.getDate()-((dt.getDay()+6)%7));return dt.toISOString().slice(0,10);}
function toast(msg,dur){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},dur||2500);}

/* ── SW ── */
function registerSW(){
  if(!("serviceWorker" in navigator))return;
  navigator.serviceWorker.register("/sw.js").then(function(r){
    swReg=r;
    navigator.serviceWorker.addEventListener("message",function(e){if(e.data&&e.data.type==="MARK_JOB_DONE")markJobDone(e.data.jobId);});
  }).catch(function(e){console.warn("SW:",e);});
}

function requestPush(){
  if(!swReg){toast("Service worker not ready.");return;}
  Notification.requestPermission().then(function(p){
    if(p!=="granted"){toast("Notifications blocked. Enable in phone settings.");return;}
    swReg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64(VAPID_KEY)}).then(function(){
      document.getElementById("notif-banner").style.display="none";
      document.getElementById("bell-btn").style.display="flex";
      toast("Notifications enabled!");
    }).catch(function(){toast("Could not enable notifications.");});
  });
}

function markJobDone(id){var j=jobs.find(function(j){return j.id===id;});if(j&&!j.done){j.done=true;save();render();toast("Job marked complete");}}
function urlB64(b){var p="=".repeat((4-b.length%4)%4),x=(b+p).replace(/-/g,"+").replace(/_/g,"/"),r=window.atob(x);return Uint8Array.from(Array.from(r).map(function(c){return c.charCodeAt(0);}));}

/* ── BIOMETRIC ── */
function registerBiometric(uid){
  if(!window.PublicKeyCredential)return Promise.resolve(false);
  var ch=crypto.getRandomValues(new Uint8Array(32));
  return navigator.credentials.create({publicKey:{challenge:ch,rp:{name:"ProClean",id:location.hostname},user:{id:new TextEncoder().encode(uid),name:uid,displayName:uname(uid)},pubKeyCredParams:[{alg:-7,type:"public-key"},{alg:-257,type:"public-key"}],authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required"},timeout:60000}}).then(function(cred){biometricUsers[uid]=btoa(String.fromCharCode.apply(null,new Uint8Array(cred.rawId)));save();return true;}).catch(function(){return false;});
}
function biometricLogin(){
  var saved=Object.keys(biometricUsers);if(!saved.length){toast("No biometric account set up.");return;}
  var ch=crypto.getRandomValues(new Uint8Array(32));
  var ac=saved.map(function(uid){return{type:"public-key",id:Uint8Array.from(atob(biometricUsers[uid]),function(c){return c.charCodeAt(0);})};});
  navigator.credentials.get({publicKey:{challenge:ch,allowCredentials:ac,userVerification:"required",timeout:60000}}).then(function(a){
    var cid=btoa(String.fromCharCode.apply(null,new Uint8Array(a.rawId)));
    var uid=saved.find(function(id){return biometricUsers[id]===cid;});
    var u=users.find(function(u){return u.id===uid;});
    if(u){currentUser=u;startApp();}else toast("Could not identify user.");
  }).catch(function(){toast("Biometric sign-in cancelled.");});
}

function deleteJob(id){
  var j=jobs.find(function(j){return j.id===id;});if(!j)return;

/* ── FINANCIAL PLANNER ── */
function getNetForPeriod(startDate,endDate){
  var periodJobs=jobs.filter(function(j){return j.date>=startDate&&j.date<=endDate&&j.done;});
  var gross=periodJobs.reduce(function(s,j){return s+Number(j.amount);},0);
  var exp=expenses.filter(function(e){return e.date>=startDate&&e.date<=endDate;}).reduce(function(s,e){return s+Number(e.amount);},0);
  var biz=bizBills.filter(function(b){return b.recurFreq==="monthly";}).reduce(function(s,b){return s+Number(b.amount);},0);
  var months=(new Date(endDate)-new Date(startDate))/(30*24*3600*1000);
  var bizPro=biz*Math.max(1,Math.round(months));
  return{gross:gross,expenses:exp,bizBills:bizPro,net:Math.max(0,gross-exp-bizPro)};
}
function getPayrollForPeriod(startDate,endDate){
  var days=(new Date(endDate+"T23:59:59")-new Date(startDate+"T00:00:00"))/(24*3600*1000);
  var weeks=days/7;
  var actualWages=users.filter(function(u){return u.role==="employee";}).reduce(function(s,u){
    var hrs=timesheets.filter(function(t){return t.date>=startDate&&t.date<=endDate&&t.userId===u.id;}).reduce(function(ss,t){return ss+(t.hours||0);},0);
    return s+hrs*(hourlyRates[u.id]||0);
  },0);
  var buffer=finSettings.payrollBuffer*weeks;
  return{actual:actualWages,buffer:buffer,total:actualWages+buffer};
}
function calcPots(net,payroll){
  var tax=pct(net,finSettings.taxPct)+pct(net,finSettings.taxBuffer);
  var equipment=pct(net,finSettings.equipPct);
  var remaining=Math.max(0,net-tax-payroll.total-equipment);
  var personal=remaining;
  return{tax:tax,payroll:payroll.total,equipment:equipment,personal:personal,net:net};
}
function dateRangeForPeriod(){
  var now=new Date(finYear+"-"+String(finMonth+1).padStart(2,"0")+"-01T12:00:00");
  if(finPeriod==="day"){var s=td();return{start:s,end:s,label:"Today"};}
  if(finPeriod==="week"){var ws=wkStart(td());var we=new Date(ws+"T12:00:00");we.setDate(we.getDate()+6);return{start:ws,end:we.toISOString().slice(0,10),label:"This week"};}
  if(finPeriod==="month"){var yr=now.getFullYear(),mo=now.getMonth();var s2=yr+"-"+String(mo+1).padStart(2,"0")+"-01";var e2=new Date(yr,mo+1,0).toISOString().slice(0,10);return{start:s2,end:e2,label:now.toLocaleDateString("en-GB",{month:"long",year:"numeric"})};}
  if(finPeriod==="quarter"){var q=Math.floor(finMonth/3);var qs=q*3;var qe=qs+2;var s3=finYear+"-"+String(qs+1).padStart(2,"0")+"-01";var e3=new Date(finYear,qe+1,0).toISOString().slice(0,10);return{start:s3,end:e3,label:"Q"+(q+1)+" "+finYear};}
  var s4=finYear+"-01-01",e4=finYear+"-12-31";return{start:s4,end:e4,label:"Year "+finYear};
}

      +(mktGenerating?"<div class='ai-thinking'><div class='spinner'></div>Analysing your photos and writing posts...</div>":"")
      +"<button class='btn-primary' onclick='mktGeneratePosts()'"+(mktGenerating?" disabled":"")+">"
      +"<i class='ti ti-sparkles'></i> Generate posts with AI</button>";
  }
  if(mktTab==="ads"){
    var adsContent="";
    if(mktLoading){adsContent="<div class='ai-thinking'><div class='spinner'></div>Pulling top 10 competitor ads from Meta Ad Library...</div>";}
    else if(mktAnalysing){adsContent="<div class='ai-thinking'><div class='spinner'></div>Claude is comparing ads — analysing hooks, format, length, CTAs...</div>";}
    else if(mktAnalysis){
      var recs=mktAnalysis.recommendations||[];
      var recsHtml=recs.length?"<div class='card' style='margin-bottom:.75rem;background:var(--teal-l);border-color:#99f6e4'>"
        +"<div class='card-hdr'><div class='card-title' style='color:var(--teal-d)'><i class='ti ti-bulb' style='margin-right:4px'></i>5 recommendations for ProClean</div></div>"
        +recs.map(function(r,i){return "<div style='display:flex;gap:.6rem;padding:.4rem 0;border-bottom:1px solid #99f6e4'>"
          +"<div style='width:20px;height:20px;border-radius:50%;background:var(--teal);color:#fff;font-size:.68rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px'>"+(i+1)+"</div>"
          +"<div style='font-size:.8rem;color:var(--teal-d);line-height:1.5'>"+r+"</div></div>";}).join("")
        +"</div>":"";
      var ads=mktAnalysis.analysis||[];
      var hookColors={Problem:"bg-red",Proof:"bg-green",Offer:"bg-amber",Curiosity:"bg-purple",Local:"bg-teal",Story:"bg-brand"};
      adsContent=recsHtml+ads.map(function(a,i){
        var hc=hookColors[a.hook_type]||"bg-gray";
        return "<div class='card' style='margin-bottom:.65rem'>"
          +"<div style='display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem'>"
          +"<div style='width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0'>"+(i+1)+"</div>"
          +"<div style='flex:1;font-size:.82rem;font-weight:600;color:var(--ink)'>"+a.page+"</div>"
          +"<span class='badge "+hc+"'>"+a.hook_type+"</span>"
          +"</div>"
          +"<div style='font-size:.78rem;color:var(--ink2);line-height:1.5;margin-bottom:.5rem;font-style:italic'>“"+a.hook+"”</div>"
          +"<div style='display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.45rem'>"
          +"<span class='badge bg-gray'><i class='ti ti-text-size' style='font-size:9px'></i> "+a.word_count+" words</span>"
          +"<span class='badge bg-gray'><i class='ti ti-layout' style='font-size:9px'></i> "+a.format+"</span>"
          +"<span class='badge bg-gray'><i class='ti ti-hand-click' style='font-size:9px'></i> "+a.cta+"</span>"
          +"</div>"
          +"<div style='font-size:.73rem;color:var(--green-d);background:var(--green-l);border-radius:6px;padding:.35rem .5rem'>"
          +"<strong>Steal this:</strong> "+a.steal_this+"</div>"
          +"</div>";
      }).join("");
    } else {
      adsContent="<div class='empty'><i class='ti ti-chart-bar'></i><p>Fetch &amp; compare to see how your market is advertising</p></div>";
    }
    var searching=mktLoading||mktAnalysing;
    content="<div class='add-panel purple'><h3>Compare competitor window cleaning ads</h3>"
      +"<div class='frow full'><div class='ff'><label>Search term</label>"
      +"<input id='mkt-q' value='window cleaning' placeholder='window cleaning'/></div></div>"
      +(searching?"":"<button class='btn-purple' onclick='mktFetchAds()'><i class='ti ti-chart-dots-3'></i> Fetch &amp; compare top 10</button>")
      +(mktAnalysis&&!searching?"<button class='btn-sm' style='margin-top:.5rem' onclick='mktAnalysis=null;mktAdsData=[];render()'>Clear &amp; search again</button>":"")
      +"</div>"+adsContent;
  }
  if(mktTab==="drafts"){
    var pageId=localStorage.getItem("mktPageId");
    if(!mktDrafts.length){content="<div class='empty'><i class='ti ti-file-text'></i><p>No drafts yet — generate posts first</p></div>";}
    else{content=mktDrafts.map(function(d,i){
      var col=d.platform==="Instagram"?"bg-purple":"bg-brand";
      var postBtn="";
      if(d.platform==="Facebook"&&pageId){
        var statusStyle=d.posted?"color:var(--green);font-size:.72rem;font-weight:600":"";
        postBtn=d.posted
          ?"<span style='"+statusStyle+"'><i class='ti ti-circle-check'></i> Posted</span>"
          :"<button class='btn-sm' style='background:var(--brand);color:#fff;border-color:var(--brand)' onclick='mktPostToFB("+i+")'>"
            +"<i class='ti ti-send'></i> Post</button>";
      }
      return "<div class='card' style='margin-bottom:.65rem'>"
        +"<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:.55rem'>"
        +"<span class='badge "+col+"'>"+d.platform+"</span>"
        +"<div style='display:flex;gap:.35rem;align-items:center'>"
        +postBtn
        +"<button class='btn-sm' onclick='mktCopy("+i+")'><i class='ti ti-copy'></i> Copy</button>"
        +"<button class='btn-del' onclick='mktDelDraft("+i+")'><i class='ti ti-trash' style='font-size:11px'></i></button>"
        +"</div></div>"
        +"<div style='font-size:.82rem;color:var(--ink);line-height:1.6;white-space:pre-line'>"+d.text+"</div>"
        +"</div>";
    }).join("");}
  }
  return "<div style='font-family:var(--font-head);font-size:.9rem;margin-bottom:.85rem'>Marketing</div>"+settingsHtml+tabBar+content;
}
function mktSaveKey(k,v){if(v&&v.trim())localStorage.setItem(k,v.trim());render();}
function mktAddImages(input){
  var files=Array.from(input.files);if(!files.length)return;
  var done=0,total=files.length;
  files.forEach(function(f){
    var r=new FileReader();
    r.onload=function(e){mktImages.push({name:f.name,data:e.target.result,mime:f.type});done++;if(done===total)render();};
    r.readAsDataURL(f);
  });
}
function mktRemoveImg(i){mktImages.splice(i,1);render();}
function mktFetchAds(){
  var token=localStorage.getItem("mktMetaToken");
  var q=(document.getElementById("mkt-q")||{value:"window cleaning"}).value||"window cleaning";
  if(!token){toast("Enter your Meta access token in Settings first.");return;}
  var key=localStorage.getItem("mktAnthropicKey");
  if(!key){toast("Enter your Anthropic API key in Settings first.");return;}
  mktLoading=true;mktAdsData=[];mktAnalysis=null;render();
  fetch("https://graph.facebook.com/v21.0/ads_archive?search_terms="+encodeURIComponent(q)
    +"&ad_type=ALL&fields=id,ad_creative_bodies,ad_creative_link_titles,ad_creative_link_descriptions,page_name&limit=25"
    +"&access_token="+encodeURIComponent(token))
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error){toast("Meta: "+data.error.message);mktLoading=false;render();return;}
    var raw=(data.data||[]).filter(function(a){
      return (a.ad_creative_bodies&&a.ad_creative_bodies[0])||(a.ad_creative_link_titles&&a.ad_creative_link_titles[0]);
    }).slice(0,10);
    mktAdsData=raw;mktLoading=false;
    if(!raw.length){toast("No ads with copy found — try a broader term.");render();return;}
    mktAnalyseAds(key,raw);
  })
  .catch(function(err){toast("Fetch failed: "+err.message);mktLoading=false;render();});
}
function mktAnalyseAds(key,ads){
  mktAnalysing=true;render();
  var adsList=ads.map(function(a,i){
    var body=(a.ad_creative_bodies&&a.ad_creative_bodies[0])||"";
    var title=(a.ad_creative_link_titles&&a.ad_creative_link_titles[0])||"";
    var desc=(a.ad_creative_link_descriptions&&a.ad_creative_link_descriptions[0])||"";
    return "Ad "+(i+1)+" — Page: "+(a.page_name||"Unknown")+"\n"
      +(title?"Headline: "+title+"\n":"")
      +(body?"Body: "+body+"\n":"")
      +(desc?"Description: "+desc:"");
  }).join("\n\n");
  var sys="You are a direct-response marketing expert specialising in local service businesses. "
    +"Analyse these "+ads.length+" window cleaning competitor ads and compare them to ProClean (window cleaning, Adeje Tenerife, friendly local brand targeting residential & commercial clients). "
    +"For each ad identify: the opening hook verbatim, hook type (choose one: Problem/Proof/Offer/Curiosity/Local/Story), "
    +"approximate word count of body copy, format (e.g. Short Text, Long Text, Text+Image, Carousel), CTA style, "
    +"and one specific tactic ProClean should steal. "
    +"Then give exactly 5 concrete recommendations for ProClean based on patterns you see working across these ads. "
    +"Return ONLY valid JSON, no markdown:\n"
    +'{"analysis":[{"rank":1,"page":"...","hook":"...","hook_type":"...","word_count":0,"format":"...","cta":"...","steal_this":"..."}],"recommendations":["...","...","...","...","..."]}';
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2500,system:sys,messages:[{role:"user",content:"Here are the "+ads.length+" competitor ads to analyse:\n\n"+adsList}]})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error){toast("Analysis error: "+data.error.message);mktAnalysing=false;render();return;}
    var txt=((data.content||[]).find(function(b){return b.type==="text";})||{text:"{}"}).text;
    mktAnalysis=JSON.parse(txt.replace(/```json|```/g,"").trim());
    mktAnalysing=false;render();
    toast("Analysis complete — "+((mktAnalysis.analysis||[]).length)+" ads compared");
  })
  .catch(function(err){toast("Analysis failed: "+err.message);mktAnalysing=false;render();});
}
function mktGeneratePosts(){
  var key=localStorage.getItem("mktAnthropicKey");
  if(!key){toast("Enter your Anthropic API key in Settings first.");return;}
  if(!mktImages.length){toast("Add at least one photo first.");return;}
  var tone=(document.getElementById("mkt-tone")||{value:"friendly"}).value||"friendly";
  var plat=(document.getElementById("mkt-plat")||{value:"both"}).value||"both";
  var toneMap={friendly:"friendly, warm and conversational",professional:"polished and professional",offer:"exciting and promotional"};
  var platStr=plat==="both"?"one for Facebook and one for Instagram":"one for "+(plat==="facebook"?"Facebook":"Instagram");
  var adsCtx="";
  if(mktAdsData.length){
    var sample=mktAdsData.slice(0,5).map(function(ad){return(ad.ad_creative_bodies&&ad.ad_creative_bodies[0])||"";}).filter(Boolean).map(function(t){return "- "+t.slice(0,120);}).join("\n");
    if(sample)adsCtx="\n\nInspiration from real competitor window cleaning ads:\n"+sample;
  }
  var sys="You are a social media expert for ProClean, a window cleaning business in Adeje, Tenerife. "
    +"Write "+platStr+" based on the provided photo(s). Tone: "+(toneMap[tone]||"friendly")+". "
    +"Use British English. Include a call-to-action to book ProClean. Facebook max 120 words. Instagram: vivid caption + 15 relevant hashtags. "
    +"Return ONLY valid JSON with no markdown: {\"posts\":[{\"platform\":\"Facebook\",\"text\":\"...\"},{\"platform\":\"Instagram\",\"text\":\"...\"}]}";
  var msgContent=[{type:"text",text:"Write social media posts for ProClean based on these window cleaning photos."+adsCtx}];
  mktImages.slice(0,3).forEach(function(img){msgContent.push({type:"image",source:{type:"base64",media_type:img.mime,data:img.data.split(",")[1]}});});
  mktGenerating=true;render();
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,system:sys,messages:[{role:"user",content:msgContent}]})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error){toast("API error: "+data.error.message);mktGenerating=false;render();return;}
    var txt=((data.content||[]).find(function(b){return b.type==="text";})||{text:"{}"}).text;
    var parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
    var newDrafts=(parsed.posts||[]).map(function(p){return{platform:p.platform,text:p.text};});
    if(plat!=="both")newDrafts=newDrafts.filter(function(p){return p.platform.toLowerCase()===plat;});
    mktDrafts=newDrafts.concat(mktDrafts);mktTab="drafts";mktGenerating=false;render();
    toast(newDrafts.length+" posts ready to review");
  })
  .catch(function(err){toast("Generation failed: "+err.message);mktGenerating=false;render();});
}
function mktCopy(i){
  var t=(mktDrafts[i]||{}).text;if(!t)return;
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){toast("Copied to clipboard");});}
  else{var el=document.createElement("textarea");el.value=t;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);toast("Copied");}
}
function mktDelDraft(i){mktDrafts.splice(i,1);render();}
function mktPostToFB(i){
  var draft=mktDrafts[i];if(!draft)return;
  var token=localStorage.getItem("mktMetaToken");
  var pageId=localStorage.getItem("mktPageId");
  if(!token){toast("Enter your Meta access token in Settings.");return;}
  if(!pageId){toast("Enter your Facebook Page ID in Settings.");return;}
  var img=mktImages[0]||null;
  var endpoint=img
    ?"https://graph.facebook.com/v21.0/"+pageId+"/photos"
    :"https://graph.facebook.com/v21.0/"+pageId+"/feed";
  var doPost=function(body,isForm){
    return fetch(endpoint,{method:"POST",body:isForm?body:JSON.stringify(body),headers:isForm?{}:{"Content-Type":"application/json"}});
  };
  var go;
  if(img){
    var b64=img.data.split(",")[1];
    var bytes=atob(b64);var ab=new ArrayBuffer(bytes.length);var ua=new Uint8Array(ab);
    for(var k=0;k<bytes.length;k++)ua[k]=bytes.charCodeAt(k);
    var blob=new Blob([ab],{type:img.mime});
    var fd=new FormData();fd.append("message",draft.text);fd.append("source",blob,"photo.jpg");fd.append("access_token",token);
    go=doPost(fd,true);
  } else {
    go=doPost({message:draft.text,access_token:token},false);
  }
  toast("Posting to Facebook...");
  go.then(function(r){return r.json();})
    .then(function(data){
      if(data.error){toast("Error: "+data.error.message);return;}
      mktDrafts[i].posted=true;render();
      toast("Posted to Facebook!");
    })
    .catch(function(err){toast("Post failed: "+err.message);});
}
